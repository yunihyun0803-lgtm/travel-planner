<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FEE500;
    --yellow-dark: #E6CE00;
    --bg: #F7F7F8;
    --white: #FFFFFF;
    --text: #1A1A1A;
    --text-sub: #6B6B6B;
    --text-muted: #ABABAB;
    --border: #E5E5E5;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .logo-icon { width: 32px; height: 32px; background: var(--yellow); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; background: transparent; color: var(--text-sub); transition: all 0.15s; }
  .btn:hover { background: var(--bg); }

  .day-tabs { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 4px; height: 46px; flex-shrink: 0; overflow-x: auto; }
  .day-tab { padding: 6px 16px; border-radius: 20px; border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-sub); white-space: nowrap; transition: all 0.15s; }
  .day-tab:hover { background: var(--bg); }
  .day-tab.active { background: var(--yellow); color: var(--text); }
  .btn-add-day { padding: 6px 12px; border-radius: 20px; border: 1px dashed var(--border); background: transparent; cursor: pointer; font-size: 13px; color: var(--text-muted); font-family: inherit; transition: all 0.15s; white-space: nowrap; }
  .btn-add-day:hover { border-color: var(--text-sub); color: var(--text-sub); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .timeline-panel { width: 460px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); overflow: hidden; }
  .timeline-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 14px; font-weight: 700; }
  .stop-count { background: var(--yellow); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .timeline-scroll { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .stop-wrapper { display: flex; gap: 12px; margin-bottom: 4px; }
  .stop-line { display: flex; flex-direction: column; align-items: center; padding-top: 18px; flex-shrink: 0; }
  .stop-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--white); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-sub); flex-shrink: 0; }
  .stop-dot.active-dot { background: var(--yellow); border-color: var(--yellow); color: var(--text); }
  .stop-connector { width: 2px; flex: 1; background: var(--border); margin: 4px 0; min-height: 20px; }
  .stop-card { flex: 1; background: var(--white); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); transition: all 0.15s; }
  .stop-card:hover { box-shadow: var(--shadow); }
  .stop-card.highlighted { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(254,229,0,0.3); }
  .stop-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .time-input { border: none; background: var(--bg); border-radius: 6px; padding: 3px 6px; font-family: inherit; font-size: 12px; color: var(--text); cursor: pointer; outline: none; }
  .stop-delete { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
  .stop-delete:hover { background: #fee; color: #e85d4a; }
  .stop-name-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--text); outline: none; margin-bottom: 8px; }
  .stop-name-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .stop-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .cat-select { border: none; border-radius: 20px; padding: 3px 10px; font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer; outline: none; }
  .cat-관광 { background: #EBF4FF; color: #4A90D9; }
  .cat-식사 { background: #FEF0EE; color: #E85D4A; }
  .cat-숙소 { background: #F0EEFF; color: #7B68EE; }
  .cat-이동 { background: #EDFAF3; color: #52C788; }
  .memo-input { flex: 1; border: none; background: transparent; font-family: inherit; font-size: 12px; color: var(--text-sub); outline: none; min-width: 0; }
  .memo-input::placeholder { color: var(--text-muted); }

  /* 이동수단 + 소요시간 */
  .transport-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--bg); }
  .transport-btns { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .transport-label { font-size: 11px; color: var(--text-muted); }
  .transport-btn { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-family: inherit; font-size: 11px; cursor: pointer; color: var(--text-sub); transition: all 0.15s; }
  .transport-btn.active-transport { background: var(--text); color: var(--white); border-color: var(--text); }

  /* 소요시간 뱃지 */
  .time-summary { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .time-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .time-badge.walk    { background: #EDFAF3; color: #52C788; }
  .time-badge.car     { background: #EBF4FF; color: #4A90D9; }
  .time-badge.bus     { background: #FEF0EE; color: #E85D4A; }
  .time-badge.loading { background: var(--bg); color: var(--text-muted); animation: pulse 1.2s infinite; }
  .time-badge.error   { background: var(--bg); color: var(--text-muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* 대중교통 상세 경로 */
  .transit-detail { margin-top: 6px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .transit-step { display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px; font-size: 11px; border-bottom: 1px solid var(--bg); }
  .transit-step:last-child { border-bottom: none; }
  .transit-step-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .icon-walk  { background: #EDFAF3; }
  .icon-bus   { background: #FEF0EE; }
  .icon-sub   { background: #EBF4FF; }
  .transit-step-info { flex: 1; line-height: 1.5; }
  .transit-step-name { font-weight: 600; color: var(--text); }
  .transit-step-desc { color: var(--text-sub); font-size: 10px; }
  .transit-step-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

  .btn-add-stop { width: 100%; padding: 12px; border: 1px dashed var(--border); border-radius: var(--radius); background: transparent; font-family: inherit; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; margin-top: 4px; }
  .btn-add-stop:hover { border-color: var(--yellow); color: var(--text); background: #FFFDE7; }

  .timeline-footer { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--white); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; font-size: 13px; }
  .footer-label { color: var(--text-sub); }
  .footer-value { font-weight: 700; }

  .map-panel { flex: 1; position: relative; }
  #kakaoMap { width: 100%; height: 100%; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--white); border-radius: 16px; padding: 24px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal input[type="date"] { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; margin-bottom: 16px; outline: none; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-yellow { background: var(--yellow); border-color: var(--yellow); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🗺️</div>
    <span>여행 플래너</span>
  </div>
  <button class="btn" onclick="exportCSV()">⬇ CSV 내보내기</button>
</header>

<div class="day-tabs" id="dayTabs"></div>

<div class="main">
  <div class="timeline-panel">
    <div class="timeline-header">
      📋 일정 타임라인
      <span class="stop-count" id="stopCount">0개 장소</span>
    </div>
    <div class="timeline-scroll" id="timelineScroll"></div>
    <div class="timeline-footer">
      <span class="footer-label">총 장소</span>
      <span class="footer-value" id="totalCount">0개</span>
    </div>
  </div>
  <div class="map-panel">
    <div id="kakaoMap"></div>
  </div>
</div>

<div class="modal-overlay" id="dateModal">
  <div class="modal">
    <h3>📅 날짜 추가</h3>
    <input type="date" id="newDateInput">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-yellow" onclick="confirmAddDay()">추가</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  🔑 키 설정
// ══════════════════════════════════════════
const KAKAO_REST_KEY = 'df3b8dcb49a5702a7d40fae940ad3e17';
const ODSAY_KEY      = 'V1hY1ycdWsswHGFswy3HJQ';
const KAKAO_JS_KEY   = '3a651c6517e513f7e0819dd46ae3ee23';

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state = { days: [], currentDayIdx: 0 };
let timeCache = {};         // 소요시간 캐시
let routeCache = {};        // 도로 경로 좌표 캐시
let map = null;
let routePolylines = [];    // 현재 지도에 그려진 경로선
let markerOverlays = [];    // 마커

function uid() { return Math.random().toString(36).slice(2,9); }
function save() { try { localStorage.setItem('tp-v5', JSON.stringify(state)); } catch(e) {} }
function load() { try { const s = localStorage.getItem('tp-v5'); return s ? JSON.parse(s) : null; } catch(e) { return null; } }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════
//  KAKAO SDK 동적 로드
// ══════════════════════════════════════════
function loadKakaoSDK() {
  return new Promise(resolve => {
    if (window.kakao && window.kakao.maps) { resolve(); return; }
    const s = document.createElement('script');
    s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&libraries=services&autoload=false`;
    s.onload = () => kakao.maps.load(resolve);
    s.onerror = () => resolve();
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
async function init() {
  const saved = load();
  if (saved && saved.days && saved.days.length > 0) {
    state = saved;
  } else {
    const today = new Date().toISOString().slice(0,10);
    state = {
      currentDayIdx: 0,
      days: [{ date: today, stops: [
        { id:uid(), time:'09:00', name:'경복궁',       cat:'관광', memo:'한복 입고 입장하기', transport:'대중교통', lat:null, lng:null },
        { id:uid(), time:'12:00', name:'광장시장',     cat:'식사', memo:'육회비빔밥 먹기',    transport:'도보',     lat:null, lng:null },
        { id:uid(), time:'14:00', name:'북촌한옥마을', cat:'관광', memo:'사진 스팟 탐방',    transport:'자동차',   lat:null, lng:null },
      ]}]
    };
    save();
  }
  await loadKakaoSDK();
  initMap();
  renderTabs();
  renderTimeline();
  geocodeAll();
}

// ══════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════
function initMap() {
  if (!window.kakao || !kakao.maps) return;
  try {
    map = new kakao.maps.Map(document.getElementById('kakaoMap'), {
      center: new kakao.maps.LatLng(37.5665, 126.9780), level: 7
    });
  } catch(e) {}
}

async function geocodeAll() {
  const day = state.days[state.currentDayIdx];
  if (!day) return;
  for (const s of day.stops) {
    if (s.name && (!s.lat || !s.lng)) {
      const c = await geocode(s.name);
      if (c) { s.lat = c.lat; s.lng = c.lng; }
    }
  }
  save();
  await drawAllRoutes();
  renderTimeline();
  fetchAllTimes();
}

async function geocode(name) {
  if (!name.trim()) return null;
  try {
    const r = await fetch(
      `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(name)}&size=1`,
      { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }
    );
    const d = await r.json();
    if (d.documents?.length) return { lat: parseFloat(d.documents[0].y), lng: parseFloat(d.documents[0].x) };
  } catch(e) {}
  return null;
}

// ── 마커 + 경로선 전체 렌더 ──
async function drawAllRoutes() {
  if (!map) return;

  // 기존 제거
  routePolylines.forEach(p => { try { p.setMap(null); } catch(e) {} });
  markerOverlays.forEach(m => { try { m.setMap(null); } catch(e) {} });
  routePolylines = []; markerOverlays = [];

  const day = state.days[state.currentDayIdx];
  if (!day) return;

  const valid = day.stops.filter(s => s.lat && s.lng);
  if (!valid.length) return;

  const bounds = new kakao.maps.LatLngBounds();

  // 마커 찍기
  valid.forEach((s, i) => {
    const pos = new kakao.maps.LatLng(s.lat, s.lng);
    bounds.extend(pos);
    const div = document.createElement('div');
    div.style.cssText = 'background:#FEE500;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);cursor:pointer;color:#1A1A1A;';
    div.textContent = i + 1;
    div.onclick = () => highlightCard(s.id);
    const ov = new kakao.maps.CustomOverlay({ position: pos, content: div, yAnchor: 0.5 });
    ov.setMap(map);
    markerOverlays.push(ov);
  });

  // 구간별 실제 경로 그리기
  for (let i = 0; i < day.stops.length - 1; i++) {
    const a = day.stops[i], b = day.stops[i+1];
    if (!a.lat || !b.lat) continue;
    await drawSegmentRoute(a, b);
  }

  map.setBounds(bounds);
}

// 구간별 경로 그리기 (이동수단에 따라 색상/스타일 다르게)
async function drawSegmentRoute(a, b) {
  const key = `route_${a.lat},${a.lng}|${b.lat},${b.lng}|${a.transport}`;

  let coords = routeCache[key];
  if (!coords) {
    if (a.transport === '자동차') {
      coords = await fetchCarRoute(a, b);
    } else if (a.transport === '도보') {
      coords = straightLineCoords(a, b); // 도보는 직선 (카카오 도보 경로 미제공)
    } else {
      // 대중교통도 직선으로 (ODsay는 좌표 경로 미제공)
      coords = straightLineCoords(a, b);
    }
    routeCache[key] = coords || [];
  }

  if (!coords || !coords.length) return;

  const colorMap = { '자동차': '#4A90D9', '도보': '#52C788', '대중교통': '#E85D4A' };
  const styleMap = { '자동차': 'solid', '도보': 'shortdot', '대중교통': 'dash' };

  const poly = new kakao.maps.Polyline({
    path: coords.map(c => new kakao.maps.LatLng(c[0], c[1])),
    strokeWeight: 4,
    strokeColor: colorMap[a.transport] || '#FEE500',
    strokeOpacity: 0.85,
    strokeStyle: styleMap[a.transport] || 'solid'
  });
  poly.setMap(map);
  routePolylines.push(poly);
}

// 카카오 자동차 경로 좌표 가져오기
async function fetchCarRoute(a, b) {
  try {
    const r = await fetch(
      `https://apis-navi.kakaomobility.com/v1/directions?origin=${a.lng},${a.lat}&destination=${b.lng},${b.lat}&priority=RECOMMEND`,
      { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }
    );
    const d = await r.json();
    const sections = d.routes?.[0]?.sections;
    if (!sections) return null;
    const coords = [];
    sections.forEach(sec => {
      sec.roads?.forEach(road => {
        for (let i = 0; i < road.vertexes.length; i += 2) {
          coords.push([road.vertexes[i+1], road.vertexes[i]]); // [lat, lng]
        }
      });
    });
    return coords.length ? coords : null;
  } catch(e) { return null; }
}

function straightLineCoords(a, b) {
  return [[a.lat, a.lng], [b.lat, b.lng]];
}

function highlightCard(id) {
  document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('highlighted'));
  const el = document.querySelector(`.stop-card[data-id="${id}"]`);
  if (el) { el.classList.add('highlighted'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// ══════════════════════════════════════════
//  소요시간 (선택한 이동수단만)
// ══════════════════════════════════════════
async function fetchAllTimes() {
  const day = state.days[state.currentDayIdx];
  if (!day) return;
  for (let i = 0; i < day.stops.length - 1; i++) {
    const a = day.stops[i], b = day.stops[i+1];
    if (!a.lat || !b.lat) continue;
    const key = `time_${a.lat},${a.lng}|${b.lat},${b.lng}|${a.transport}`;
    if (timeCache[key]) { renderTimeInfo(a.id, a.transport, timeCache[key]); continue; }
    renderTimeLoading(a.id);
    const result = await fetchTimeByTransport(a, b, a.transport);
    timeCache[key] = result;
    renderTimeInfo(a.id, a.transport, result);
  }
}

async function fetchTimeByTransport(a, b, transport) {
  if (transport === '자동차') {
    return await fetchCarTime(a, b);
  } else if (transport === '도보') {
    return fetchWalkTime(a, b);
  } else {
    return await fetchTransitDetail(a, b);
  }
}

async function fetchCarTime(a, b) {
  try {
    const r = await fetch(
      `https://apis-navi.kakaomobility.com/v1/directions?origin=${a.lng},${a.lat}&destination=${b.lng},${b.lat}&priority=RECOMMEND`,
      { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }
    );
    const d = await r.json();
    const sec = d.routes?.[0]?.summary?.duration;
    return sec != null ? { type: 'car', minutes: Math.round(sec/60) } : null;
  } catch(e) { return null; }
}

function fetchWalkTime(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  const dist = R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  return { type: 'walk', minutes: Math.round(dist/67) };
}

async function fetchTransitDetail(a, b) {
  try {
    const url = `https://api.odsay.com/v1/api/searchPubTransPathT?SX=${a.lng}&SY=${a.lat}&EX=${b.lng}&EY=${b.lat}&apiKey=${encodeURIComponent(ODSAY_KEY)}`;
    const r = await fetch(url);
    const d = await r.json();
    const path = d.result?.path?.[0];
    if (!path) return null;

    const totalTime = path.info.totalTime;
    const steps = [];

    path.subPath?.forEach(sub => {
      if (sub.trafficType === 1) {
        // 지하철
        steps.push({
          type: 'subway',
          icon: '🚇',
          name: sub.lane?.[0]?.name || '지하철',
          from: sub.startName,
          to: sub.endName,
          time: sub.sectionTime,
          stationCount: sub.stationCount
        });
      } else if (sub.trafficType === 2) {
        // 버스
        const busNums = sub.lane?.map(l => l.busNo).filter(Boolean).join(', ') || '';
        steps.push({
          type: 'bus',
          icon: '🚌',
          name: `버스 ${busNums}`,
          from: sub.startName,
          to: sub.endName,
          time: sub.sectionTime,
          stationCount: sub.stationCount
        });
      } else if (sub.trafficType === 3) {
        // 도보
        if (sub.sectionTime > 0) {
          steps.push({
            type: 'walk',
            icon: '🚶',
            name: '도보',
            from: '',
            to: '',
            time: sub.sectionTime,
            distance: sub.distance
          });
        }
      }
    });

    return { type: 'transit', totalTime, steps };
  } catch(e) { return null; }
}

// ── 소요시간 렌더 ──
function renderTimeLoading(stopId) {
  const el = document.querySelector(`.stop-card[data-id="${stopId}"] .time-info-area`);
  if (!el) return;
  el.innerHTML = `<span class="time-badge loading">⏳ 계산 중...</span>`;
}

function renderTimeInfo(stopId, transport, result) {
  const el = document.querySelector(`.stop-card[data-id="${stopId}"] .time-info-area`);
  if (!el) return;

  if (!result) {
    el.innerHTML = `<span class="time-badge error">경로 정보 없음</span>`;
    return;
  }

  if (result.type === 'car') {
    el.innerHTML = `<div class="time-summary"><span class="time-badge car">🚗 약 ${result.minutes}분</span></div>`;
  } else if (result.type === 'walk') {
    el.innerHTML = `<div class="time-summary"><span class="time-badge walk">🚶 약 ${result.minutes}분</span></div>`;
  } else if (result.type === 'transit') {
    let html = `<div class="time-summary"><span class="time-badge bus">🚌 총 ${result.totalTime}분</span></div>`;
    if (result.steps && result.steps.length) {
      html += `<div class="transit-detail">`;
      result.steps.forEach(step => {
        const iconClass = step.type === 'subway' ? 'icon-sub' : step.type === 'bus' ? 'icon-bus' : 'icon-walk';
        let desc = '';
        if (step.type === 'walk') {
          desc = step.distance ? `${step.distance}m` : '';
        } else {
          desc = `${step.from} → ${step.to}`;
          if (step.stationCount) desc += ` (${step.stationCount}정거장)`;
        }
        html += `
          <div class="transit-step">
            <div class="transit-step-icon ${iconClass}">${step.icon}</div>
            <div class="transit-step-info">
              <div class="transit-step-name">${escHtml(step.name)}</div>
              ${desc ? `<div class="transit-step-desc">${escHtml(desc)}</div>` : ''}
            </div>
            <div class="transit-step-time">${step.time}분</div>
          </div>`;
      });
      html += `</div>`;
    }
    el.innerHTML = html;
  }
}

// ══════════════════════════════════════════
//  TIMELINE 렌더
// ══════════════════════════════════════════
function renderTimeline() {
  const day = state.days[state.currentDayIdx];
  const scroll = document.getElementById('timelineScroll');
  if (!scroll) return;
  scroll.innerHTML = '';
  if (!day || !day.stops) return;

  day.stops.forEach((stop, i) => {
    const isLast = (i === day.stops.length - 1);
    const w = document.createElement('div');
    w.className = 'stop-wrapper';
    w.innerHTML = `
      <div class="stop-line">
        <div class="stop-dot ${stop.lat ? 'active-dot' : ''}">${i+1}</div>
        ${!isLast ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-card" data-id="${stop.id}">
        <div class="stop-card-top">
          <input type="time" class="time-input" value="${stop.time}"
            onchange="updateStop('${stop.id}','time',this.value)">
          <button class="stop-delete" onclick="deleteStop('${stop.id}')">✕</button>
        </div>
        <input class="stop-name-input" placeholder="장소 이름 입력" value="${escHtml(stop.name)}"
          oninput="updateStopName('${stop.id}',this.value)">
        <div class="stop-meta">
          <select class="cat-select cat-${stop.cat}"
            onchange="updateStop('${stop.id}','cat',this.value);this.className='cat-select cat-'+this.value">
            <option value="관광" ${stop.cat==='관광'?'selected':''}>관광</option>
            <option value="식사" ${stop.cat==='식사'?'selected':''}>식사</option>
            <option value="숙소" ${stop.cat==='숙소'?'selected':''}>숙소</option>
            <option value="이동" ${stop.cat==='이동'?'selected':''}>이동</option>
          </select>
          <input class="memo-input" placeholder="메모 추가..." value="${escHtml(stop.memo||'')}"
            onchange="updateStop('${stop.id}','memo',this.value)">
        </div>
        ${!isLast ? `
        <div class="transport-row">
          <div class="transport-btns">
            <span class="transport-label">이동수단</span>
            ${['도보','대중교통','자동차'].map(t =>
              `<button class="transport-btn ${stop.transport===t?'active-transport':''}"
                onclick="changeTransport('${stop.id}','${t}',this)">${t}</button>`
            ).join('')}
          </div>
          <div class="time-info-area">
            <span class="time-badge loading">⏳ 계산 중...</span>
          </div>
        </div>` : ''}
      </div>`;
    scroll.appendChild(w);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-stop';
  addBtn.textContent = '+ 장소 추가';
  addBtn.onclick = addStop;
  scroll.appendChild(addBtn);

  document.getElementById('stopCount').textContent = `${day.stops.length}개 장소`;
  document.getElementById('totalCount').textContent = `${day.stops.length}개`;

  // 캐시 즉시 반영
  day.stops.forEach((s, i) => {
    if (i === day.stops.length - 1) return;
    const next = day.stops[i+1];
    if (!s.lat || !next?.lat) return;
    const key = `time_${s.lat},${s.lng}|${next.lat},${next.lng}|${s.transport}`;
    if (timeCache[key]) renderTimeInfo(s.id, s.transport, timeCache[key]);
  });
}

// ══════════════════════════════════════════
//  CRUD
// ══════════════════════════════════════════
let gTimer = null;

function updateStop(id, key, val) {
  const s = state.days[state.currentDayIdx].stops.find(s => s.id === id);
  if (!s) return;
  s[key] = val; save(); renderTimeline();
}

function updateStopName(id, val) {
  const s = state.days[state.currentDayIdx].stops.find(s => s.id === id);
  if (!s) return;
  s.name = val; s.lat = null; s.lng = null; save();
  clearTimeout(gTimer);
  gTimer = setTimeout(async () => {
    if (!val.trim()) return;
    const c = await geocode(val);
    if (c) {
      s.lat = c.lat; s.lng = c.lng;
      timeCache = {}; routeCache = {};
      save(); await drawAllRoutes(); renderTimeline(); fetchAllTimes();
    }
  }, 900);
}

async function changeTransport(id, val, btn) {
  const s = state.days[state.currentDayIdx].stops.find(s => s.id === id);
  if (!s) return;
  s.transport = val; save();

  // 버튼 UI 업데이트
  btn.closest('.transport-btns').querySelectorAll('.transport-btn').forEach(b => {
    b.classList.toggle('active-transport', b.textContent === val);
  });

  // 해당 구간 경로 & 시간 재계산
  routeCache = {}; // 경로 캐시 초기화 (이동수단 바꼈으니)
  await drawAllRoutes();

  // 시간 재계산
  const day = state.days[state.currentDayIdx];
  const idx = day.stops.findIndex(s => s.id === id);
  const next = day.stops[idx + 1];
  if (!s.lat || !next?.lat) return;

  const key = `time_${s.lat},${s.lng}|${next.lat},${next.lng}|${val}`;
  if (timeCache[key]) { renderTimeInfo(id, val, timeCache[key]); return; }

  renderTimeLoading(id);
  const result = await fetchTimeByTransport(s, next, val);
  timeCache[key] = result;
  renderTimeInfo(id, val, result);
}

function addStop() {
  state.days[state.currentDayIdx].stops.push({
    id: uid(), time: '12:00', name: '', cat: '관광', memo: '', transport: '대중교통', lat: null, lng: null
  });
  save(); renderTimeline();
}

function deleteStop(id) {
  const day = state.days[state.currentDayIdx];
  if (day.stops.length <= 1) { alert('최소 1개의 장소가 필요합니다.'); return; }
  if (!confirm('이 장소를 삭제할까요?')) return;
  day.stops = day.stops.filter(s => s.id !== id);
  timeCache = {}; routeCache = {};
  save(); drawAllRoutes(); renderTimeline(); fetchAllTimes();
}

// ══════════════════════════════════════════
//  TABS & MODAL
// ══════════════════════════════════════════
function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  if (!tabs) return;
  tabs.innerHTML = '';
  state.days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = `day-tab ${i === state.currentDayIdx ? 'active' : ''}`;
    btn.textContent = `Day ${i+1}  ${day.date}`;
    btn.onclick = () => {
      state.currentDayIdx = i; timeCache = {}; routeCache = {};
      save(); renderTabs(); renderTimeline(); geocodeAll();
    };
    tabs.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'btn-add-day'; add.textContent = '+ 날짜 추가'; add.onclick = openModal;
  tabs.appendChild(add);
}

function openModal() {
  document.getElementById('newDateInput').value = new Date().toISOString().slice(0,10);
  document.getElementById('dateModal').classList.add('show');
}
function closeModal() { document.getElementById('dateModal').classList.remove('show'); }
function confirmAddDay() {
  const date = document.getElementById('newDateInput').value;
  if (!date) return;
  state.days.push({ date, stops: [{ id: uid(), time: '09:00', name: '', cat: '관광', memo: '', transport: '대중교통', lat: null, lng: null }] });
  state.currentDayIdx = state.days.length - 1;
  timeCache = {}; routeCache = {};
  save(); renderTabs(); renderTimeline(); closeModal();
}

// ══════════════════════════════════════════
//  CSV
// ══════════════════════════════════════════
function exportCSV() {
  const rows = [['Day','날짜','순서','시간','장소','카테고리','메모','이동수단']];
  state.days.forEach((day, di) => {
    day.stops.forEach((s, si) => {
      rows.push([`Day${di+1}`, day.date, si+1, s.time, s.name, s.cat, s.memo||'', s.transport]);
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = '여행일정.csv'; a.click();
}
